                ('10000000-0000-0000-0000-000000000029', 'EXECUTE_RIGHT_TO_ERASURE',          'GRANTED',               'Execute right-to-erasure (system)'),
                ('10000000-0000-0000-0000-000000000030', 'EXECUTE_RIGHT_TO_ERASURE',          'FOUR_EYE_REQUIRED',     'Execute right-to-erasure (four-eye)'),
                ('10000000-0000-0000-0000-000000000031', 'REQUEST_RIGHT_TO_ERASURE',          'GRANTED',               'Request right-to-erasure'),
                ('10000000-0000-0000-0000-000000000032', 'INVOKE_AI_PIPELINES',               'GRANTED',               'Invoke AI pipelines');
