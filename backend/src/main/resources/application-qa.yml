spring:
  datasource:
    url: jdbc:postgresql://qa-db.internal:5432/claims_qa
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  file:
    name: ${LOG_PATH:logs}/claims-backend.log
  structured:
    format:
      console: logstash
      file: logstash
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 14
      total-size-cap: 2GB
      clean-history-on-start: false
  level:
    root: INFO
    com.heisenbug.claims: INFO

integrations:
  pas:
    base-url: https://pas.qa.internal

cors:
  allowed-origins: https://claims.qa.internal
