# Custom tuning for the single-VM claims deployment.
# Appended after the stock postgresql.conf via include_dir — last value wins.
# Takes effect on `docker compose restart postgres`.

# --- Connections ---
# Backend Hikari pool is capped at 10 (application-docker.yml); 50 leaves
# headroom for psql sessions, pg_dump, and one-off maintenance connections.
max_connections = 50

# --- Memory ---
# Sized to start cleanly on a constrained CI runner (default Docker /dev/shm
# is 64MB). Bump these once you know the host has headroom. Rule of thumb:
# shared_buffers ~= 25% of RAM, effective_cache_size ~= 75%.
shared_buffers = 128MB
effective_cache_size = 384MB
work_mem = 4MB
maintenance_work_mem = 32MB

# --- WAL / durability ---
# Defaults are fine for MVP. Revisit if write latency becomes a concern.
wal_compression = on

# --- Telemetry ---
# Load pg_stat_statements so the extension created in init/001 can collect.
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all

# --- Logging ---
# `mod` logs every DDL + data-modifying statement. Useful during hackathon
# debugging; dial back to `ddl` or `none` if log volume becomes a problem.
log_statement = 'mod'
log_min_duration_statement = 500ms
log_line_prefix = '%t [%p] %q%u@%d '
log_timezone = 'UTC'
