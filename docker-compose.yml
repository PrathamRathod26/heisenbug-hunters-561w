name: claims-platform

# Single-VM deployment. See README "Docker deployment" section for full walkthrough.
# All four services share one user-defined bridge; only the frontend (nginx) port
# is published to the host. Secrets come from .env (see .env.example).

services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-claims}
    # Bootstrap + tuning live in ./database (see database/README.md).
    # init/ runs once on empty volumes; conf.d/ is layered via include_dir on every start.
    command: postgres -c include_dir=/etc/postgresql/conf.d
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/conf.d:/etc/postgresql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${DB_USER:-postgres} -d ${DB_NAME:-claims} -q"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 3s
    networks:
      - claims-net

  ml-services:
    build:
      context: ./ml-services
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ml-models:/app/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - claims-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-claims}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      INTEGRATIONS_ML_SERVICE_BASE_URL: http://ml-services:8000
      INTEGRATIONS_PAS_BASE_URL: http://localhost:9999
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      CLAIMS_UPLOAD_DIR: /app/uploads
      JAVA_TOOL_OPTIONS: >-
        -XX:MaxRAMPercentage=75
        -XX:+UseG1GC
        -Djava.security.egd=file:/dev/./urandom
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ml-services:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - claims-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - claims-net

volumes:
  postgres-data:
  backend-uploads:
  ml-models:

networks:
  claims-net:
    driver: bridge
