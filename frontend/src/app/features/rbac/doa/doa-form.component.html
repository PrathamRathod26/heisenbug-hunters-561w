<div class="page">
  <div class="page-header">
    <div>
      <a class="router-link" routerLink="/rbac/doa-matrix">← All DOA entries</a>
      <h1>New DOA entry</h1>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Role</mat-label>
            <mat-select formControlName="roleId">
              @for (r of roles(); track r.id) {
                <mat-option [value]="r.id">{{ r.name }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Line of business</mat-label>
            <mat-select formControlName="lineOfBusiness">
              @for (l of lobs; track l) {
                <mat-option [value]="l">{{ l }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Geo (ISO-3166)</mat-label>
            <input matInput formControlName="geo" placeholder="IN or IN-MH">
            <mat-error>Valid ISO-3166 code required</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Approve up to (₹)</mat-label>
            <input matInput type="number" formControlName="approveUpToRupees" min="0" step="0.01">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Four-eye above (₹)</mat-label>
            <input matInput type="number" formControlName="fourEyeAboveRupees" min="0" step="0.01">
          </mat-form-field>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;">
          <a mat-button routerLink="/rbac/doa-matrix">Cancel</a>
          <button type="submit" mat-raised-button color="primary" [disabled]="form.invalid">Create</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
