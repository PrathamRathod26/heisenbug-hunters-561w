<div class="page">
  <div class="page-header">
    <h1>Users</h1>
    <div class="page-actions">
      <a mat-raised-button color="primary" routerLink="new">
        <mat-icon>add</mat-icon> New user
      </a>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" style="min-width: 200px;">
          <mat-label>User type</mat-label>
          <mat-select [(ngModel)]="type" (selectionChange)="filterChanged()">
            <mat-option value="">All</mat-option>
            @for (t of userTypes; track t) {
              <mat-option [value]="t">{{ t }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" style="min-width: 200px;">
          <mat-label>Status</mat-label>
          <mat-select [(ngModel)]="status" (selectionChange)="filterChanged()">
            <mat-option value="">All</mat-option>
            @for (s of userStatuses; track s) {
              <mat-option [value]="s">{{ s }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <table mat-table [dataSource]="page()?.content ?? []" style="width: 100%; margin-top: 12px;">
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let u">{{ u.email }}</td>
        </ng-container>
        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let u">{{ u.displayName }}</td>
        </ng-container>
        <ng-container matColumnDef="userType">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let u"><span class="pill pill-muted">{{ u.userType }}</span></td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let u"><span [class]="statusPillClass(u.status)">{{ u.status }}</span></td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let u">
            <a mat-icon-button [routerLink]="['/rbac/users', u.id]" title="Open">
              <mat-icon>open_in_new</mat-icon>
            </a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols"></tr>
      </table>

      @if ((page()?.content?.length ?? 0) === 0) {
        <div class="muted" style="padding: 16px;">No users found.</div>
      }

      <mat-paginator
        [length]="page()?.totalElements ?? 0"
        [pageIndex]="pageIndex" [pageSize]="pageSize"
        [pageSizeOptions]="[10, 25, 50, 100]"
        (page)="onPage($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
