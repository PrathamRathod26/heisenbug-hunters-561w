server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large enough for 10 photos + short video per FRS FR-2 envelope.
    client_max_body_size 150M;

    # Sensible timeouts — ML pipeline can take 30-60s on a cold GPT call.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 30s;

    gzip on;
    gzip_types text/css application/javascript application/json application/xml;

    # Backend API + Spring Boot surfaces proxied to the backend container.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location = /v3/api-docs {
        proxy_pass http://backend:8080;
    }
    location /v3/api-docs/ {
        proxy_pass http://backend:8080;
    }
    location /swagger-ui {
        proxy_pass http://backend:8080;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
    }
    location = /swagger-ui.html {
        proxy_pass http://backend:8080;
    }

    # Static asset caching for the built Angular bundle (hashed filenames).
    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path serves index.html so client-side
    # routing can handle /claims/:id, /rbac/users, /login, etc. on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
