server {
    listen ${PORT} default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 150M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 30s;

    gzip on;
    gzip_types text/css application/javascript application/json application/xml;

    location /api/ {
        set $backend https://${BACKEND_HOST};
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /actuator/ {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location = /v3/api-docs {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
    }

    location /v3/api-docs/ {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
    }

    location /swagger-ui {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
    }

    location /swagger-ui/ {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
    }

    location = /swagger-ui.html {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend;
    }

    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
